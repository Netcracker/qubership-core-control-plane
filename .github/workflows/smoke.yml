name: Ratelimit smoke test
run-name: "Ratelimit smoke [${{ inputs.ratelimit-image-tag || 'feat-ratelimit-snapshot' }}]"

on:
  push:
    branches:
      - feat/ratelimit
    paths:
      - 'ratelimit-service/**'
      - '.github/workflows/smoke.yml'
  workflow_dispatch:
    inputs:
      core-bootstrap-branch:
        description: 'Branch of core-bootstrap repo'
        required: false
        default: 'main'
        type: string
      istio-repo-branch:
        description: 'Branch of the Istio repo'
        required: false
        default: 'main'
        type: string
      ratelimit-image-tag:
        description: 'Docker image tag for ratelimit service'
        required: false
        default: 'feat-ratelimit-snapshot'
        type: string
      namespace:
        description: 'Kubernetes namespace for ratelimit'
        required: false
        default: 'core'
        type: string
      skip-install:
        description: 'Skip ratelimit installation (already deployed)'
        required: false
        default: false
        type: boolean
      collect-logs-for:
        description: 'Labels of services which logs are required to collect for debugging. Comma-separated label_name=value pairs (name=mesh-test-service-spring-v1,app=control-plane, app.kubernetes.io/name=public-gateway)'
        required: false
        default: 'app=ratelimit'
        type: string

jobs:
  smoke:
    name: "Smoke (baseline → install → scenarios → report)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Kind cluster and deploy Cloud Core
        uses: Netcracker/qubership-core-test-apps/.github/actions/setup-kind-with-cloud-core@main
        with:
          core-bootstrap-branch: ${{ inputs.core-bootstrap-branch || 'main' }}
          install-istio: true
          istio-repo-branch: ${{ inputs.istio-repo-branch || 'main' }}
          install-maas: false
          facade-operator-tag: latest
          ingress-gateway-tag: latest
          control-plane-tag: latest
          paas-mediation-tag: latest
          dbaas-agent-tag: latest
          core-operator-tag: latest
          config-server-tag: latest
          site-management-tag: latest
          test-branch: main
          mesh-type: Istio

      - name: Run ratelimit smoke test
        id: smoke
        working-directory: ratelimit-service
        env:
          NAMESPACE:       ${{ inputs.namespace || 'core' }}
          HELM_IMAGE_TAG:  ${{ inputs.ratelimit-image-tag || 'feat-ratelimit-snapshot' }}
          HELM_IMAGE_REPO: ghcr.io/netcracker/qubership-core-ratelimit
          HELM_RELEASE:    ratelimit
          HELM_CHART:      ./helm-charts
          SKIP_INSTALL:    ${{ (inputs.skip-install && 'true') || 'false' }}
          RESULTS_DIR:     ${{ runner.temp }}/ratelimit-smoke-results
          CI:              "true"
        run: |
          echo "results_dir=${RESULTS_DIR}" >> "$GITHUB_OUTPUT"
          bash tests/smoke/run-integration-test.sh

      - name: Publish comparison report to job summary
        if: always()
        run: |
          REPORT="${{ steps.smoke.outputs.results_dir }}/comparison-report.md"
          if [ -f "$REPORT" ]; then
            cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ⚠️ Smoke report not generated" >> "$GITHUB_STEP_SUMMARY"
          fi


      - name: Collect Kubernetes diagnostics
        if: ${{ failure() || steps.smoke.outcome == 'failure' }}
        env:
          COLLECT_LOGS_FOR: ${{ inputs.collect-logs-for || 'app=ratelimit' }}
        run: |
          set +e

          echo "==== Collecting cluster state ===="

          {
            echo "==== CLUSTER INFO ===="
            kubectl version || true
            kubectl cluster-info || true

            echo
            echo "==== NODES ===="
            kubectl get nodes -o wide || true

            echo
            echo "==== PODS (ALL NAMESPACES) ===="
            kubectl get pods -A -o wide || true

            echo
            echo "==== DEPLOYMENTS ===="
            kubectl get deployments -A || true

            echo
            echo "==== SERVICES ===="
            kubectl get services -A || true

            echo
            echo "==== HTTPROUTES ===="
            kubectl get httproute -A -o yaml|| true

            echo
            echo "==== ENVOY FILTERS ===="
            kubectl get envoyfilter -A -o yaml|| true

            echo
            echo "==== EVENTS (CHRONOLOGICAL) ===="
            kubectl get events -A --sort-by=.metadata.creationTimestamp || true

            echo
            echo "==== KIND CLUSTER ===="
            kind get clusters || true
            docker ps -a --filter "name=kind" || true

            echo
            echo "==== KIND CONTROL PLANE LOGS ===="
            KIND_NODE=$(docker ps --filter "name=control-plane" --format "{{.Names}}" | head -1)
            echo "Detected kind control-plane container: ${KIND_NODE:-<none found>}"
            if [ -n "$KIND_NODE" ]; then
              docker logs "$KIND_NODE" || true
            fi

            echo
            echo "==== KUBELET LOGS ===="
            if [ -n "$KIND_NODE" ]; then
              docker exec "$KIND_NODE" journalctl -u kubelet --no-pager || true
            fi

          } > cluster-state.txt 2>&1

          {
            collect_pod_logs() {
              local pod_file="$1"
              local empty_message="$2"
              
              if [ ! -s "$pod_file" ]; then
                echo "$empty_message"
                return
              fi
              
              while read -r ns pod phase; do
                echo
                echo "################################################"
                echo "# Pod: $pod"
                echo "# Namespace: $ns"
                echo "# Phase: $phase"
                echo "################################################"
                
                echo
                echo "---- kubectl describe ----"
                kubectl describe pod "$pod" -n "$ns" || true
                
                echo
                echo "---- container logs ----"
                for c in $(kubectl get pod "$pod" -n "$ns" -o jsonpath='{.spec.containers[*].name}' 2>/dev/null); do
                  echo
                  echo "-- logs for container: $c"
                  kubectl logs -n "$ns" "$pod" -c "$c" --tail=5000 || true

                  echo
                  echo "-- previous logs for container: $c"
                  kubectl logs -n "$ns" "$pod" -c "$c" --previous --tail=5000 || true
                done
              done < "$pod_file"
            }
            
            echo "==== Collecting unhealthy pod logs ===="
            kubectl get pods -A \
              -o jsonpath='{range .items[?(@.status.phase!="Running" && @.status.phase!="Succeeded")]}{.metadata.namespace} {.metadata.name} {.status.phase}{"\n"}{end}' \
              > /tmp/unhealthy-pods.txt || true
            
            collect_pod_logs /tmp/unhealthy-pods.txt "No unhealthy pods found"
            
            echo "==== Collecting logs for labeled pods ===="

            : > /tmp/load-logs-pods.txt || true

            if [ -n "$COLLECT_LOGS_FOR" ]; then
              IFS=',' read -ra LABELS <<< "$COLLECT_LOGS_FOR"
              for lbl in "${LABELS[@]}"; do
                lbl_trimmed=$(echo "$lbl" | xargs)
                if [ -z "$lbl_trimmed" ]; then
                  continue
                fi
                echo "Collecting pods for label selector: $lbl_trimmed"
                kubectl get pods -A -l "$lbl_trimmed" \
                  -o jsonpath='{range .items[*]}{.metadata.namespace} {.metadata.name} {.status.phase}{"\n"}{end}' \
                  >> /tmp/load-logs-pods.txt || true
              done
            fi

            collect_pod_logs /tmp/load-logs-pods.txt "No pods found for provided labels: $COLLECT_LOGS_FOR"
            
            # cleanup
            rm -f /tmp/unhealthy-pods.txt /tmp/load-logs-pods.txt
            
          } > pods-logs.txt 2>&1
      
      - name: Upload Kubernetes diagnostics
        if: ${{ failure() || steps.smoke.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: kind-k8s-debug
          path: |
            cluster-state.txt
            pods-logs.txt

      - name: Upload smoke results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ratelimit-smoke-results-${{ github.run_id }}
          path: ${{ steps.smoke.outputs.results_dir }}/
          retention-days: 30
          if-no-files-found: warn
