name: '[Ratelimit] Go build'

on:
  push:
    branches:
      - '**'
    paths:
      - 'ratelimit-service/**'

concurrency:
  group: ci-ratelimit-build-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true


jobs:
  build:
    name: Build and test
    uses: Netcracker/qubership-core-infra/.github/workflows/generic-go-build.yaml@bc2a0bd082147e23b4091616c608a21cc2957728 # v2.4.1
    with:
      go-module-dir: ratelimit-service
      sonar-project-key: ${{ vars.SONAR_PROJECT_KEY }}
      docker-config-file: "ratelimit---docker-dev-config.json"
    secrets: inherit