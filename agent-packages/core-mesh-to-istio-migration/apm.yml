name: core-mesh-to-istio-migration
version: 1.0.0
description: Orchestrates the full Cloud-Core Mesh to Istio migration end-to-end — converts declarative mesh CRs to Gateway API, migrates route-registration libraries, wires SERVICE_MESH_TYPE, generates HTTPRoutes from code, and maintains MIGRATION_LOG.md.
author: Qubership
dependencies:
  apm:
    - Netcracker/qubership-core-control-plane/agent-packages/core-mesh-crs-to-gatewayapi
    - Netcracker/qubership-core-control-plane/agent-packages/httproute-from-code
