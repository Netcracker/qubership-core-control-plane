# ==========================================
# PRIVATE ROUTES
# ==========================================
# Private routes - API v1/v2 and no API path
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: '{{ .Values.SERVICE_NAME }}-private-routes'
  labels:
    app.kubernetes.io/name: '{{ printf "%s-private-routes" .Values.SERVICE_NAME }}'
    app.kubernetes.io/instance: '{{ printf "%s-private-routes-%s" .Values.SERVICE_NAME .Values.NAMESPACE | trunc 63 | trimSuffix "-" }}'
    app.kubernetes.io/version: "{{ .Chart.AppVersion }}"
    app.kubernetes.io/component: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/part-of: 'Cloud-Core'
    app.kubernetes.io/managed-by: 'Helm'
    app.kubernetes.io/processed-by-operator: 'istiod'
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.ISTIO_PRIVATE_GATEWAY_NAME }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v1/routes"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v1/routes/private-gateway-service"
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.SERVICE_NAME }}
          port: 8080
          weight: 1
    
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v1/control-plane/routes/clusters"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v1/routes/clusters"
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.SERVICE_NAME }}
          port: 8080
          weight: 1
    
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v1/control-plane/routes/route-configs"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v1/routes/route-configs"
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.SERVICE_NAME }}
          port: 8080
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: "/health"
        - path:
            type: PathPrefix
            value: "/api/v2/control-plane/routes"
        - path:
            type: PathPrefix
            value: "/api/v2/control-plane/routing/details"
        - path:
            type: PathPrefix
            value: "/api/v2/control-plane/versions"
        - path:
            type: PathPrefix
            value: "/api/v2/control-plane/versions/watch"
        - path:
            type: PathPrefix
            value: "/api/v2/control-plane/promote"
        - path:
            type: PathPrefix
            value: "/api/v2/control-plane/rollback"
        - path:
            type: PathPrefix
            value: "/api/v2/control-plane/endpoints"
        - path:
            type: PathPrefix
            value: "/api/v2/control-plane/load-balance"
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.SERVICE_NAME }}
          port: 8080
          weight: 1

