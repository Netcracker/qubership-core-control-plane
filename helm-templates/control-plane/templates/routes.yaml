{{- if eq .Values.SERVICE_MESH_TYPE "Istio" }}
# ==========================================
# INTERNAL ROUTES
# ==========================================
# Internal routes - control-plane
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: '{{ .Values.SERVICE_NAME }}-internal-routes'
  labels:
    app.kubernetes.io/name: '{{ printf "%s-internal-routes" .Values.SERVICE_NAME }}'
    app.kubernetes.io/instance: '{{ printf "%s-internal-routes-%s" .Values.SERVICE_NAME .Values.NAMESPACE | trunc 63 | trimSuffix "-" }}'
    app.kubernetes.io/version: "{{ .Chart.AppVersion }}"
    app.kubernetes.io/component: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/part-of: 'Cloud-Core'
    app.kubernetes.io/managed-by: 'Helm'
    app.kubernetes.io/processed-by-operator: 'istiod'
spec:
  parentRefs:
    - name: {{ .Values.INTERNAL_SERVICE_NAME}}
      kind: Service
      group: ""
      port: 8080
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v1/routes"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v1/routes/internal-gateway-service"
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.SERVICE_NAME }}
          port: 8080
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v2/control-plane/routing/details"
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.SERVICE_NAME }}
          port: 8080
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/routing/details"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v3/routing/details"
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.SERVICE_NAME }}
          port: 8080
          weight: 1
    
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/active-active"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v3/active-active"
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.SERVICE_NAME }}
          port: 8080
          weight: 1
    
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/composite-platform/namespaces"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v3/composite-platform/namespaces"
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.SERVICE_NAME }}
          port: 8080
          weight: 1
    
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/versions/microservices"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v3/versions/microservices"
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.SERVICE_NAME }}
          port: 8080
          weight: 1
    
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/versions/registry"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v3/versions/registry"
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.SERVICE_NAME }}
          port: 8080
          weight: 1
    
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/rate-limits"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v3/rate-limits"
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.SERVICE_NAME }}
          port: 8080
          weight: 1
    
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/http-filters"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v3/http-filters"
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.SERVICE_NAME }}
          port: 8080
          weight: 1
    
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/gateways/specs"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v3/gateways/specs"
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.SERVICE_NAME }}
          port: 8080
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: "/health"
      backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.SERVICE_NAME }}
          port: 8080
          weight: 1

