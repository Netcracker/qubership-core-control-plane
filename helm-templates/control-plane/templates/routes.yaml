{{- if eq .Values.SERVICE_MESH_TYPE "Istio" }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: '{{ .Values.SERVICE_NAME }}-internal-routes'
  labels:
    app.kubernetes.io/name: {{ .Values.SERVICE_NAME }}
    app.kubernetes.io/version: "{{ .Chart.AppVersion }}"
    app.kubernetes.io/component: gateway-routes
    app.kubernetes.io/part-of: {{ .Values.SERVICE_NAME }}
    app.kubernetes.io/managed-by: Helm
spec:
  parentRefs:
    - name: {{ .Values.INTERNAL_SERVICE_NAME}}
      kind: Service
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v1/routes"
        - path:
            type: PathPrefix
            value: "/api/v2/control-plane/routing/details"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/routing/details"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/active-active"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/composite-platform/namespaces"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/versions/microservices"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/versions/registry"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/rate-limits"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/http-filters"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/gateways/specs"
        - path:
            type: PathPrefix
            value: "/health"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: config-server-internal-routes
  labels:
    app.kubernetes.io/name: config-server
    app.kubernetes.io/version: "{{ .Chart.AppVersion }}"
    app.kubernetes.io/component: gateway-routes
    app.kubernetes.io/part-of: {{ .Values.SERVICE_NAME }}
    app.kubernetes.io/managed-by: Helm
spec:
  parentRefs:
    - name: {{ .Values.INTERNAL_SERVICE_NAME}}
      kind: Service
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v1/config-server"
      backendRefs:
        - name: config-server
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: '{{ .Values.SERVICE_NAME }}-public-routes'
  labels:
    app.kubernetes.io/name: {{ .Values.SERVICE_NAME }}
    app.kubernetes.io/version: "{{ .Chart.AppVersion }}"
    app.kubernetes.io/component: gateway-routes
    app.kubernetes.io/part-of: {{ .Values.SERVICE_NAME }}
    app.kubernetes.io/managed-by: Helm
spec:
  parentRefs:
    - name: {{ .Values.ISTIO_PUBLIC_GATEWAY_NAME }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v1/routes"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/ui"
        - path:
            type: PathPrefix
            value: "/health"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: '{{ .Values.SERVICE_NAME }}-private-routes'
  labels:
    app.kubernetes.io/name: {{ .Values.SERVICE_NAME }}
    app.kubernetes.io/version: "{{ .Chart.AppVersion }}"
    app.kubernetes.io/component: gateway-routes
    app.kubernetes.io/part-of: {{ .Values.SERVICE_NAME }}
    app.kubernetes.io/managed-by: Helm
spec:
  parentRefs:
    - name: {{ .Values.ISTIO_PRIVATE_GATEWAY_NAME }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v1/routes"
        - path:
            type: PathPrefix
            value: "/api/v1/control-plane/routes/clusters"
        - path:
            type: PathPrefix
            value: "/api/v1/control-plane/routes/route-configs"
        - path:
            type: PathPrefix
            value: "/api/v2/control-plane/routes"
        - path:
            type: PathPrefix
            value: "/api/v2/control-plane/routing/details"
        - path:
            type: PathPrefix
            value: "/api/v2/control-plane/versions"
        - path:
            type: PathPrefix
            value: "/api/v2/control-plane/promote"
        - path:
            type: PathPrefix
            value: "/api/v2/control-plane/rollback"
        - path:
            type: PathPrefix
            value: "/api/v2/control-plane/endpoints"
        - path:
            type: PathPrefix
            value: "/api/v2/control-plane/load-balance"
        - path:
            type: PathPrefix
            value: "/api/v2/control-plane/versions/watch"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/routing/details"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/versions"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/versions/microservices"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/promote"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/rollback"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/endpoints"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/load-balance"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/rate-limits"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/http-filters"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/gateways/specs"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/versions/watch"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/routes"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/domains"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/config"
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/apply-config"
        - path:
            type: RegularExpression
            value: "/api/v3/control-plane/([^/]+)/([^/]+)(/.*)"
        - path:
            type: PathPrefix
            value: "/health"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: config-server-private-routes
  labels:
    app.kubernetes.io/name: config-server
    app.kubernetes.io/version: "{{ .Chart.AppVersion }}"
    app.kubernetes.io/component: gateway-routes
    app.kubernetes.io/part-of: {{ .Values.SERVICE_NAME }}
    app.kubernetes.io/managed-by: Helm
spec:
  parentRefs:
    - name: {{ .Values.ISTIO_PRIVATE_GATEWAY_NAME }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v1/config-server"
      backendRefs:
        - name: config-server
          port: 8080
{{- end }}
