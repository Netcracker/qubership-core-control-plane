{{- if eq .Values.SERVICE_MESH_TYPE "Istio" }}
# ==========================================
# INTERNAL ROUTES
# ==========================================
# Internal routes - control-plane
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: '{{ .Values.SERVICE_NAME }}-internal-routes'
  labels:
    app.kubernetes.io/name: {{ .Values.SERVICE_NAME }}
    app.kubernetes.io/version: "{{ .Chart.AppVersion }}"
    app.kubernetes.io/component: gateway-routes
    app.kubernetes.io/part-of: {{ .Values.SERVICE_NAME }}
    app.kubernetes.io/managed-by: Helm
spec:
  parentRefs:
    - name: {{ .Values.INTERNAL_SERVICE_NAME}}
      kind: Service
      group: ""
      port: 8080
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v1/routes"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v1/routes/internal-gateway-service"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v2/control-plane/routing/details"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/routing/details"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v3/routing/details"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
    
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/active-active"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v3/active-active"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
    
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/composite-platform/namespaces"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v3/composite-platform/namespaces"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
    
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/versions/microservices"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v3/versions/microservices"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
    
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/versions/registry"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v3/versions/registry"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
    
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/rate-limits"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v3/rate-limits"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
    
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/http-filters"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v3/http-filters"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
    
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v3/control-plane/gateways/specs"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v3/gateways/specs"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: "/health"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080

---
# Internal routes - config-server
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: config-server-internal-routes
  labels:
    app.kubernetes.io/name: config-server
    app.kubernetes.io/version: "{{ .Chart.AppVersion }}"
    app.kubernetes.io/component: gateway-routes
    app.kubernetes.io/part-of: {{ .Values.SERVICE_NAME }}
    app.kubernetes.io/managed-by: Helm
spec:
  parentRefs:
    - name: {{ .Values.INTERNAL_SERVICE_NAME}}
      kind: Service
      group: ""
      port: 8080
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v1/config-server"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/"
      backendRefs:
        - name: config-server
          port: 8080

