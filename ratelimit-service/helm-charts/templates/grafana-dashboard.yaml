{{- if .Values.monitoring.grafanaDashboard.enabled }}
apiVersion: integreatly.org/v1alpha1
kind: GrafanaDashboard
metadata:
  name: ratelimit-service-dashboard
  labels:
    app: ratelimit
spec:
  name: ratelimit-service.json
  json: |
    {{ .Files.Get "dashboards/ratelimit-service.json" | nindent 4 }}
{{- end }}