apiVersion: v1
kind: Pod
metadata:
  name: k6-test-runner
  labels:
    app: k6-test-runner
spec:
  containers:
  - name: k6
    image: grafana/k6:latest
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache curl
        echo "=== K6 Test Runner Ready ==="
        echo "RATELIMIT_API : $RATELIMIT_API"
        echo "GATEWAY_URL   : $GATEWAY_URL"
        tail -f /dev/null
    env:
    # Namespace is injected from pod metadata so URLs stay namespace-agnostic.
    - name: POD_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: RATELIMIT_API
      value: "http://ratelimit-service.$(POD_NAMESPACE).svc.cluster.local:8082"
    - name: GATEWAY_URL
      value: "http://public-gateway-istio.$(POD_NAMESPACE).svc.cluster.local:8080"
    volumeMounts:
    - name: scripts
      mountPath: /scripts
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
  volumes:
  - name: scripts
    configMap:
      name: smoke-test-scripts
