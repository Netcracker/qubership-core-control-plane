apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-accuracy-test
  labels:
    rate-limit-config: "true"
    app: ratelimit-k6-smoke
data:
  config.yaml: |
    domain: auth_limit
    separator: "|"
    descriptors:
      - key: user_id
        value_regex: "test2"
        rate_limit:
          unit: second
          requests_per_unit: 2
        algorithm: fixed_window
        priority: 100
      - key: user_id
        value_regex: "burst"
        rate_limit:
          unit: second
          requests_per_unit: 2
        algorithm: fixed_window
        priority: 100
      - key: ""
        rate_limit:
          unit: minute
          requests_per_unit: 100
        algorithm: fixed_window
        priority: -1
