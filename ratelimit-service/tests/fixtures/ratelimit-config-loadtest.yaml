apiVersion: v1
kind: ConfigMap
metadata:
  name: ratelimit-config-loadtest
  labels:
    rate-limit-config: "true"
    app: ratelimit
    purpose: load-test
data:
  config.yaml: |
    domain: auth_limit
    separator: "|"
    descriptors:
      # Global limit for load tests
      - key: ""
        rate_limit:
          unit: second
          requests_per_unit: 1000
      
      # Primary limit for the test endpoint — 10 requests per second per user
      - key: path
        value: "/test"
        rate_limit:
          unit: second
          requests_per_unit: 50
        descriptors:
        - key: user_id
          rate_limit:
            unit: second
            requests_per_unit: 10
      
      # Additional limit for burst tests
      - key: path
        value: "/burst"
        rate_limit:
          unit: second
          requests_per_unit: 100
        descriptors:
        - key: user_id
          rate_limit:
            unit: second
            requests_per_unit: 20
      
      # Hard limit for spike tests
      - key: path
        value: "/spike"
        rate_limit:
          unit: second
          requests_per_unit: 200
        descriptors:
        - key: user_id
          rate_limit:
            unit: second
            requests_per_unit: 5