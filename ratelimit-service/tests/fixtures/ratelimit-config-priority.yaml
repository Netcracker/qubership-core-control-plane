apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-priority-rules
  labels:
    rate-limit-config: "true"
    app: ratelimit-k6-smoke
data:
  config.yaml: |
    domain: auth_limit
    separator: "|"
    descriptors:
      - key: user_id
        value_regex: "admin-.*"
        rate_limit:
          unit: minute
          requests_per_unit: 10000
        algorithm: fixed_window
        priority: 200
      - key: user_id
        value_regex: "vip-.*"
        rate_limit:
          unit: minute
          requests_per_unit: 1000
        algorithm: fixed_window
        priority: 100
      - key: user_id
        value_regex: "normal-.*"
        rate_limit:
          unit: minute
          requests_per_unit: 30
        algorithm: fixed_window
        priority: 60
      - key: user_id
        value_regex: ".*"
        rate_limit:
          unit: minute
          requests_per_unit: 100
        algorithm: fixed_window
        priority: 10
      - key: ""
        rate_limit:
          unit: minute
          requests_per_unit: 60
        algorithm: fixed_window
        priority: 0
